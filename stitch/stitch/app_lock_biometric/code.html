<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .mood-mirror-blur {
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
        }
        .glass-effect {
            backdrop-filter: blur(24px);
            background-color: rgba(248, 250, 250, 0.7);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface overflow-hidden h-screen w-screen flex flex-col">
<!-- Atmospheric Backdrop (Mood Mirror) -->
<div class="fixed top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-primary-container mood-mirror-blur"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-container mood-mirror-blur"></div>
<!-- Main Content Canvas (Focused Journey) -->
<main class="flex-1 flex flex-col items-center justify-between px-8 py-16 relative z-10">
<!-- Branding Header -->
<header class="flex flex-col items-center gap-4 text-center mt-8">
<div class="w-16 h-16 bg-primary-container flex items-center justify-center rounded-xl shadow-sm mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<h1 class="font-headline font-extrabold text-3xl text-on-primary-fixed tracking-tight">MirrorMood</h1>
<p class="font-body text-on-surface-variant max-w-[280px] leading-relaxed">
                Unlock MirrorMood to continue your journey
            </p>
</header>
<!-- Biometric Interaction Hub -->
<section class="flex flex-col items-center gap-12 w-full max-w-sm">
<!-- Biometric Visualizer -->
<div class="relative flex items-center justify-center">
<!-- Decorative concentric circles -->
<div class="absolute w-48 h-48 border-2 border-primary/5 rounded-full"></div>
<div class="absolute w-64 h-64 border border-primary/5 rounded-full"></div>
<!-- Main Biometric Icon -->
<div class="group cursor-pointer relative z-20 transition-transform active:scale-90 duration-300">
<div class="w-32 h-32 bg-surface-container-lowest flex items-center justify-center rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.08)] ring-4 ring-white">
<span class="material-symbols-outlined text-primary text-6xl" data-icon="fingerprint" data-weight="fill">fingerprint</span>
</div>
<!-- Interaction Hint -->
<div class="absolute -bottom-4 left-1/2 -translate-x-1/2 px-4 py-1.5 bg-primary text-on-primary text-[10px] font-label font-bold uppercase tracking-widest rounded-full opacity-80">
                        Scan Now
                    </div>
</div>
</div>
<div class="text-center">
<p class="font-label text-sm font-medium text-primary">Biometric Identity Required</p>
<div class="mt-2 flex justify-center gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
</div>
</div>
</section>
<!-- Fallback Actions -->
<footer class="w-full max-w-sm flex flex-col gap-4">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-headline font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="face_retouching_natural">face_retouching_natural</span>
                Retry Biometrics
            </button>
<button class="w-full h-14 bg-surface-container-high text-primary font-headline font-semibold rounded-xl active:scale-95 transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="password">password</span>
                Enter Passcode
            </button>
<div class="flex justify-between items-center mt-4 px-2">
<button class="text-on-surface-variant font-label text-xs font-semibold hover:text-primary transition-colors">
                    Emergency Call
                </button>
<button class="text-on-surface-variant font-label text-xs font-semibold hover:text-primary transition-colors">
                    Reset Access
                </button>
</div>
</footer>
</main>
<!-- Content Decorative Card (Editorial Touch) -->
<div class="absolute bottom-[-5%] left-1/2 -translate-x-1/2 w-[120%] h-[15%] bg-surface-container-low rounded-t-[100%] opacity-40 z-0"></div>
<!-- Floating Navigation Suppression Check: 
         This is a task-focused "Locked" state, therefore navigation shells are suppressed. 
    -->
